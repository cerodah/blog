---
layout: default
---
<article class="post">
  <header class="post-header">
    <time datetime="{{ page.date | date_to_xmlschema }}" class="post-date">{{ page.date | date: "%Y-%m-%d" }}</time>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="{{ '/' | prepend: site.baseurl | replace: '//', '/' }}" class="back-link">← back</a>
  </footer>
</article>
