<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | prepend: site.baseurl | replace: '//', '/' }}" class="site-title" aria-label="{{ site.title }}">
      <span class="p-user">{{ site.owner | downcase }}</span><span class="p-at">@</span><span class="p-host">home</span><span class="p-sep">:</span><span class="p-path">~</span><span class="p-dollar">$</span><span class="cursor" aria-hidden="true"></span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      {% include links.html %}
    </nav>
  </div>
</header>
